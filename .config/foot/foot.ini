# -*- conf -*-

#font=FiraCode Nerd Font:size=10
#font=/usr/share/fonts/droid/DroidSans.ttf
# font=JetBrainsMono Nerd Font:size=11


[main]
include=~/.config/omarchy/current/theme/foot.ini
term=xterm-256color
font=JetBrainsMono Nerd Font:size=9
pad=14x14
initial-window-mode=windowed
workers=0
#workers=32
selection-target=clipboard

[cursor]
style=block
blink=no

[desktop-notifications]
command=notify-send -a ${app-id} -i ${app-id} ${title} ${body}command=notify-send -a ${app-id} -i ${app-id} ${title} ${body}command=notify-send -a ${app-id} -i ${app-id} ${title} ${body}command=notify-send -a ${app-id} -i ${app-id} ${title} ${body}

[scrollback]
lines=100000

[key-bindings]
#clipboard-copy=Alt+c XF86Copy
clipboard-paste=Shift+Insert Control+Shift+v Control+i XF86Paste
clipboard-copy=Control+Insert Control+Shift+c XF86Copy
primary-paste=none
# pipe-command-output=[sh -c "f=$(mktemp); cat - > $f; footclient emacsclient -nw $f; rm $f"] Control+Alt+g
# pipe-command-output=[sh -c "xurls | uniq | tac | tofi"] Control+Alt+g
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down
pipe-visible=[sh -c "xurls | fuzzle | xargs -r vivaldi-stable"] none
pipe-scrollback=[sh -c "xurls | fuzzle | xargs -r vivaldi-stable"] none
pipe-selected=[xargs -r librewolf] none
search-start=Control+Shift+r

# open in browser
show-urls-launch=Control+u
# paste for input
show-urls-copy=Control+y

[search-bindings]
cancel=Control+g Control+Shift+c Escape
find-prev=Control+p
find-next=Control+n
commit=Return

[url-bindings]
cancel=Control+g Control+Shift+c Control+d Escape
toggle-url-visible=t

[url]
launch=vivaldi-stable ${url}
osc8-underline=always

